name: RSS to Notion

on:
  schedule:
    # 每小时运行一次 (GitHub 免费版建议间隔不要低于 5-15 分钟)
    - cron: '0 * * * *'
  workflow_dispatch: # 允许手动点击运行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Script
        env:
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          RSS_INTERVAL_SECONDS: ${{ vars.RSS_INTERVAL_SECONDS || 3600 }}
          TIMEZONE_OFFSET: 0  # GitHub Action 使用 UTC 时间，不需要转换
        run: |
          python jiclaw.py "https://ir.appliedmaterials.com/rss/news-releases.xml" "https://www.tomshardware.com/feeds.xml" "https://thelec.net/rss/S1N3.xml" "https://www.trendforce.com/feed/Semiconductors.html" "https://www.trendforce.com/feed/LED.html" scraper:semi-insights scraper:icsmart scraper:aijiwei scraper:lam-research scraper:lumentum
